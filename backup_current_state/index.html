<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gymnastics Hub | Находи и публикуй спортивные мероприятия</title>
    <meta name="description" content="Gymnastics Hub - Платформа для поиска и публикации спортивных мероприятий по всему миру.">
    
    <!-- Fonts: Raleway -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-theme">
    <header class="main-header">
        <div class="container container--wide">
            <div class="header__logo">
                <a href="/" class="logo">
                    <img src="img/logo.svg" alt="logo">
                    <span class="logo__text">GymnasticsHub</span>
                </a>
            </div>

            <nav class="header__nav">
                <ul class="nav-menu">
                    <li class="nav-menu__item dropdown">
                        <a href="#" class="nav-menu__link">Мероприятия <span class="arrow"></span></a>
                    </li>
                    <li class="nav-menu__item dropdown">
                        <a href="#" class="nav-menu__link">Медиа <span class="arrow"></span></a>
                    </li>
                    <li class="nav-menu__item">
                        <a href="#" class="nav-menu__link">Объявления</a>
                    </li>
                </ul>
            </nav>

            <div class="header__actions">
                <a href="#" class="btn btn--outline-white btn--add">
                    <img src="img/plus.svg" alt="plus">
                    Добавить мероприятие
                </a>
                <a href="#" class="btn btn--white btn--login">
                    <img src="img/user_icon.svg" alt="user" class="btn-icon" onerror="this.style.display='none'"> 
                    Войти
                </a>
            </div>

            <button class="menu-toggle" aria-label="Открыть меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main>
        <section class="hero-section">
            <div class="container hero-section__grid">
                <div class="hero-content">
                    <h1 class="hero-content__title">
                        Находи и публикуй <br>
                        спортивные мероприятия <br>
                        по всему миру
                    </h1>

                    <div class="search-card">
                        <div class="search-card__tabs">
                            <button class="tab-btn active" data-tab="all">Все</button>
                            <button class="tab-btn" data-tab="tournaments">Турниры</button>
                            <button class="tab-btn" data-tab="master-classes">Мастер-классы</button>
                            <button class="tab-btn" data-tab="seminars">Семинары</button>
                        </div>
                        <div class="search-card__body">
                            <div class="input-group">
                                <input type="text" placeholder="Страна" class="search-input">
                            </div>
                            <div class="input-group">
                                <input type="text" placeholder="Город" class="search-input">
                            </div>
                            <div class="date-row">
                                <div class="date-label">Дата проведения</div>
                                <div class="date-selects">
                                    <div class="custom-select">
                                        <select>
                                            <option value="01">01</option>
                                            <option value="02">02</option>
                                        </select>
                                        <span class="select-arrow"></span>
                                    </div>
                                    <span class="separator">/</span>
                                    <div class="custom-select">
                                        <select>
                                            <option value="00">00</option>
                                            <option value="04">04</option>
                                        </select>
                                        <span class="select-arrow"></span>
                                    </div>
                                </div>
                            </div>
                            <button class="btn btn--black btn--find">Найти</button>
                        </div>
                    </div>
                </div>

                <div class="hero-bottom-actions">
                    <a href="#" class="btn btn--outline-white">Объявления</a>
                    <a href="#" class="btn btn--white">Все мероприятия</a>
                </div>
            </div>
            
            <div class="hero-background">
                <!-- User will add image here -->
                <div class="spotlight"></div>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
