<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление аккаунта | Gymnastics Hub</title>
    <meta name="description" content="Восстановите доступ к своему аккаунту Gymnastics Hub.">
    
    <!-- Fonts: Raleway -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="loading">
    <!-- Premium Preloader -->
    <div id="preloader" class="preloader">
        <div class="preloader__content">
            <div class="preloader__star">
                <svg width="74" height="75" viewBox="0 0 74 75" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M36.6602 0L44.437 29.2244L73.3203 37.093L44.437 44.9616L36.6602 74.186L28.8834 44.9616L0 37.093L28.8834 29.2244L36.6602 0Z" fill="white"/>
                </svg>
            </div>
            <div class="preloader__text">GymnasticsHub</div>
        </div>
    </div>

    <div class="auth-page">
        <div class="auth-card">
            <!-- Premium Logo Header -->
            <div class="auth-card__logo-container">
                <a href="index.html" class="auth-logo">
                    <div class="auth-logo__star">
                        <svg width="30" height="31" viewBox="0 0 74 75" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M36.6602 0L44.437 29.2244L73.3203 37.093L44.437 44.9616L36.6602 74.186L28.8834 44.9616L0 37.093L28.8834 29.2244L36.6602 0Z" fill="black"/>
                        </svg>
                    </div>
                    <span class="auth-logo__text">GymnasticsHub</span>
                </a>
            </div>

            <h1 class="auth-card__title">Восстановление аккаунта</h1>

            <form class="auth-form" id="recoveryForm">
                <div class="form-group">
                    <input type="text" placeholder="Эл. почта или номер телефона" class="form-input" required>
                </div>

                <div class="auth-form__actions">
                    <a href="login.html" class="btn btn--outline-dark btn--rounded">← &nbsp; Назад</a>
                    <button type="submit" class="btn btn--black btn--rounded">Восстановить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
